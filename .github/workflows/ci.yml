name: CI Pipeline

# Trigger CI on push to dev branch and pull requests to main
on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-tests:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db?schema=public"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint (Code Quality)
        run: npm run lint
        continue-on-error: false
      
      - name: Run Unit Tests
        run: npm run test:unit
      
      - name: Security Audit
        run: npm run security:check

      - name: All Checks Passed ✅
        if: success()
        run: echo "🎉 All quality checks passed! Ready to merge."
      
      - name: Some Checks Failed ❌
        if: failure()
        run: |
          echo "❌ CI checks failed. Please fix the issues before merging."
          exit 1
