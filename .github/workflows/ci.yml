name: CI Pipeline

# Trigger CI on push to dev branch and pull requests to main
on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality-and-tests:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db?schema=public"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint (Code Quality)
        run: npm run lint
        continue-on-error: false
      
      - name: Run Unit Tests
        run: npm run test:unit
      
      - name: Security Audit
        run: npm run security:check

      - name: All Checks Passed ✅
        if: success()
        run: echo "🎉 All quality checks passed! Ready to merge."
      
      - name: Some Checks Failed ❌
        if: failure()
        run: |
          echo "❌ CI checks failed. Please fix the issues before merging."
          exit 1

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci_db?schema=public"
      NODE_ENV: test
      PORT: 3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Start server in background
        run: npm start &

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server is ready!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start within 60 seconds"
          exit 1

      - name: Run integration tests (Newman)
        run: npm run test:integration

  auto-pr:
    name: Auto Create PR to main
    runs-on: ubuntu-latest
    needs: [ code-quality-and-tests, integration-tests ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --head dev --base main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for dev -> main, skipping creation."
          else
            COMMIT_MSG=$(git log -1 --pretty=%s)
            PR_BODY="## Description"
            PR_BODY="$PR_BODY\nAuto-generated PR from \`dev\` branch after all CI checks passed."
            PR_BODY="$PR_BODY\n\n## Type of Change"
            PR_BODY="$PR_BODY\n- [x] New feature"
            PR_BODY="$PR_BODY\n- [x] Code refactoring"
            PR_BODY="$PR_BODY\n\n## Checklist"
            PR_BODY="$PR_BODY\n- [x] Code follows the project style (lint passed)"
            PR_BODY="$PR_BODY\n- [x] Tests prove the fix/feature works"
            PR_BODY="$PR_BODY\n- [x] All new and existing tests passed"
            PR_BODY="$PR_BODY\n- [x] No security vulnerabilities introduced"
            PR_BODY="$PR_BODY\n\n## Testing"
            PR_BODY="$PR_BODY\nAll CI checks passed:"
            PR_BODY="$PR_BODY\n- Linting"
            PR_BODY="$PR_BODY\n- Unit tests"
            PR_BODY="$PR_BODY\n- Security audit"
            PR_BODY="$PR_BODY\n- Integration tests (Newman/Postman)"
            gh pr create \
              --title "$COMMIT_MSG" \
              --base main \
              --head dev \
              --body "$(echo -e "$PR_BODY")"
            echo "PR created successfully!"
          fi
